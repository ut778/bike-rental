{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <i class="bi bi-car-front-fill text-primary" style="font-size: 3rem;"></i>
            <h2 class="fw-bold mt-2">Welcome Back</h2>
            <p class="text-muted">Sign in to continue to Velocity</p>
        </div>
        
        <div class="card border-0 shadow">
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold text-uppercase">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
                            <input type="text" name="username" class="form-control border-start-0 ps-0" placeholder="Enter username" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold text-uppercase">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" id="password" class="form-control border-start-0 border-end-0 ps-0" placeholder="Enter password" required>
                            <button class="btn btn-outline-secondary border-start-0 text-muted" type="button" onclick="togglePassword()">
                                <i class="bi bi-eye" id="toggleIcon"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label text-muted small fw-bold text-uppercase">Account Type</label>
                        <select name="role" class="form-select bg-light">
                            <option value="user">Customer</option>
                            <option value="admin">Administrator</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Sign In <i class="bi bi-box-arrow-in-right ms-1"></i></button>
                </form>
            </div>
        </div>
        <div class="text-center mt-3">
            <p class="text-muted small">Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-decoration-none fw-bold">Sign up</a></p>
        </div>
    </div>
</div>

<script>
function togglePassword() {
    var x = document.getElementById("password");
    var icon = document.getElementById("toggleIcon");
    if (x.type === "password") {
        x.type = "text";
        icon.classList.remove("bi-eye");
        icon.classList.add("bi-eye-slash");
    } else {
        x.type = "password";
        icon.classList.remove("bi-eye-slash");
        icon.classList.add("bi-eye");
    }
}
</script>
{% endblock %}
