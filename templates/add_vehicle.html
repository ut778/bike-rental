{% extends 'base.html' %}
{% block content %}
<div class="mb-4">
    <a href="{{ url_for('admin.manage_vehicles') }}" class="text-decoration-none text-muted"><i class="bi bi-arrow-left me-1"></i> Back to Fleet</a>
</div>

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white border-bottom-0 pt-4 px-4">
                <div class="d-flex align-items-center">
                    <div class="bg-success bg-opacity-10 text-success p-2 rounded-circle me-3">
                        <i class="bi bi-plus-lg fs-4"></i>
                    </div>
                    <h3 class="fw-bold mb-0">Add New Vehicle</h3>
                </div>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold text-uppercase">Vehicle Number</label>
                        <input type="text" name="vehicle_number" class="form-control bg-light border-0 py-2" required placeholder="e.g. MH-12-AB-1234">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold text-uppercase">Model Name</label>
                        <input type="text" name="model" class="form-control bg-light border-0 py-2" required placeholder="e.g. Honda City">
                    </div>
                    
                    <div class="row g-3 mb-4">
                        <div class="col-sm-6">
                            <label class="form-label text-muted small fw-bold text-uppercase">Category</label>
                            <select name="type" class="form-select bg-light border-0 py-2" required>
                                <option value="" disabled selected>Select type</option>
                                <option value="Sedan">Sedan</option>
                                <option value="SUV">SUV</option>
                                <option value="Hatchback">Hatchback</option>
                                <option value="Bike">Bike</option>
                            </select>
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label text-muted small fw-bold text-uppercase">Rent per Hour ($)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="bi bi-currency-dollar"></i></span>
                                <input type="number" step="0.01" name="rent_per_hour" class="form-control bg-light border-0 py-2 border-start-0 ps-0" required placeholder="0.00">
                            </div>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-success w-100 py-3 fw-bold">Add to Fleet <i class="bi bi-check2 me-1"></i></button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
